name: Publish Multi-Arch Docker
on:
  push:
    branches: [main, 'v*-branch']
    tags: ['v*']

permissions:
  packages: write
  contents: read

jobs:
  # Single Source of Truth for Versions
  config:
    runs-on: ubuntu-latest
    outputs:
      zsdk: "1.0.0"
      jlink: "872a"
      nordic_tools: "10-24-2/nrf-command-line-tools-10.24.2"
      openocd_esp32: "v0.12.0-esp32-20260304"
      is_main: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - run: echo "Configuring build versions..."

  # 1. CI Image
  ci:
    needs: config
    uses: ./.github/workflows/build-logic.yaml
    with:
      image_name: zephyr-ci
      dockerfile: ./Dockerfile.ci
      push_latest: ${{ needs.config.outputs.is_main == 'true' }}
      build_args: |
        ZSDK_VERSION=${{ needs.config.outputs.zsdk }}

  # 2. Dev Image
  dev:
    needs: [config, ci]
    uses: ./.github/workflows/build-logic.yaml
    with:
      image_name: zephyr-dev
      dockerfile: ./Dockerfile.dev
      push_latest: ${{ needs.config.outputs.is_main == 'true' }}
      build_args: |
        ZSDK_VERSION=${{ needs.config.outputs.zsdk }}
        BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/zephyr-ci:zsdk_v${{ needs.config.outputs.zsdk }}

  # 3. Nordic Image
  nordic:
    needs: [config, dev]
    uses: ./.github/workflows/build-logic.yaml
    with:
      image_name: zephyr-dev-nordic
      dockerfile: ./Dockerfile.dev_nordic
      push_latest: ${{ needs.config.outputs.is_main == 'true' }}
      # We can simply append the extra args here
      build_args: |
        ZSDK_VERSION=${{ needs.config.outputs.zsdk }}
        BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/zephyr-dev:zsdk_v${{ needs.config.outputs.zsdk }}
        JLINK_VERSION=${{ needs.config.outputs.jlink }}
        NORDIC_COMMAND_LINE_TOOLS_VERSION=${{ needs.config.outputs.nordic_tools }}


  # 4. ESP32 Image
  esp32:
    needs: [config, dev]
    uses: ./.github/workflows/build-logic.yaml
    with:
      image_name: zephyr-dev-esp32
      dockerfile: ./Dockerfile.dev_esp32
      push_latest: ${{ needs.config.outputs.is_main == 'true' }}
      build_args: |
        ZSDK_VERSION=${{ needs.config.outputs.zsdk }}
        BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/zephyr-dev:zsdk_v${{ needs.config.outputs.zsdk }}
        OPENOCD_ESP32_VERSION=${{ needs.config.outputs.openocd_esp32 }}
